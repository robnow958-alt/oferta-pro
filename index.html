<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OfertaPro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #f1f5f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .container { max-width: 700px; width: 100%; background: white; border-radius: 20px; padding: 40px; box-shadow: 0 20px 60px rgba(0,0,0,0.1); }
        h1 { font-size: 40px; color: #2563EB; margin-bottom: 5px; }
        .subtitle { color: #64748B; font-size: 16px; margin-bottom: 30px; border-bottom: 2px solid #e2e8f0; padding-bottom: 15px; display: flex; justify-content: space-between; }
        .counter { background: #2563EB; color: white; padding: 4px 14px; border-radius: 30px; font-size: 14px; }
        label { display: block; font-weight: 600; font-size: 14px; color: #1e293b; margin-top: 16px; margin-bottom: 4px; }
        input, select, textarea { width: 100%; padding: 12px 14px; border: 1px solid #d1d5db; border-radius: 10px; font-size: 15px; transition: 0.3s; background: #f8fafc; }
        input:focus, select:focus, textarea:focus { border-color: #2563EB; outline: none; background: white; box-shadow: 0 0 0 3px rgba(37,99,235,0.15); }
        textarea { min-height: 120px; resize: vertical; }
        .row { display: flex; gap: 12px; flex-wrap: wrap; }
        .row > * { flex: 1; min-width: 150px; }
        .btn-group { display: flex; gap: 12px; flex-wrap: wrap; margin: 25px 0; }
        .btn { padding: 12px 28px; border: none; border-radius: 12px; font-weight: 600; font-size: 16px; cursor: pointer; transition: 0.3s; }
        .btn-primary { background: #2563EB; color: white; flex: 2; }
        .btn-primary:hover { background: #1d4ed8; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(37,99,235,0.3); }
        .btn-secondary { background: #e2e8f0; color: #1e293b; }
        .btn-secondary:hover { background: #cbd5e1; }
        .output { background: #f8fafc; border-radius: 12px; padding: 20px; border: 1px solid #e2e8f0; margin-top: 10px; white-space: pre-wrap; font-family: 'Courier New', monospace; font-size: 14px; line-height: 1.7; min-height: 200px; }
        .output-placeholder { color: #94a3b8; font-style: italic; }
        .auth-section { display: none; }
        .auth-section.active { display: block; }
        .app-section { display: none; }
        .app-section.active { display: block; }
        .auth-box { max-width: 400px; margin: 0 auto; }
        .auth-box h2 { margin-bottom: 20px; color: #1e293b; }
        .auth-switch { margin-top: 15px; text-align: center; font-size: 14px; color: #64748B; }
        .auth-switch a { color: #2563EB; cursor: pointer; text-decoration: underline; }
        .history-item { background: #f1f5f9; padding: 15px; border-radius: 10px; margin-bottom: 12px; border-left: 4px solid #2563EB; }
        .history-item small { color: #64748B; }
        .history-item .offer-text { white-space: pre-wrap; font-size: 13px; margin-top: 8px; background: white; padding: 12px; border-radius: 6px; max-height: 150px; overflow-y: auto; }
        .hidden { display: none; }
        .logout-btn { background: none; border: none; color: #ef4444; cursor: pointer; font-size: 14px; font-weight: 600; margin-left: 15px; }
        .logout-btn:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="container" id="app">

    <!-- LOGOWANIE -->
    <div id="authSection" class="auth-section active">
        <div class="auth-box">
            <h1 style="font-size:32px; text-align:center;">OfertaPro</h1>
            <p style="text-align:center; color:#64748B; margin-bottom:25px;">Zaloguj się aby generować oferty</p>

            <div id="loginForm">
                <label>Email</label>
                <input type="email" id="loginEmail" placeholder="twoj@email.pl">
                <label>Hasło</label>
                <input type="password" id="loginPassword" placeholder="••••••••">
                <button class="btn btn-primary" style="width:100%; margin-top:18px;" onclick="handleLogin()">Zaloguj się</button>
                <div class="auth-switch">Nie masz konta? <a onclick="showRegister()">Zarejestruj się</a></div>
            </div>

            <div id="registerForm" class="hidden">
                <label>Email</label>
                <input type="email" id="registerEmail" placeholder="twoj@email.pl">
                <label>Hasło (min. 6 znaków)</label>
                <input type="password" id="registerPassword" placeholder="••••••••">
                <button class="btn btn-primary" style="width:100%; margin-top:18px;" onclick="handleRegister()">Zarejestruj się</button>
                <div class="auth-switch">Masz już konto? <a onclick="showLogin()">Zaloguj się</a></div>
            </div>
        </div>
    </div>

    <!-- APLIKACJA -->
    <div id="appSection" class="app-section">

        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h1>OfertaPro</h1>
            <div>
                <span id="userEmail" style="font-size:14px; color:#64748B;"></span>
                <button class="logout-btn" onclick="handleLogout()">Wyloguj</button>
            </div>
        </div>
        <div class="subtitle">
            <span>Generuj profesjonalne oferty</span>
            <span class="counter" id="counterDisplay">Dzisiaj: 0/5</span>
        </div>

        <label>Nazwa klienta</label>
        <input type="text" id="clientName" placeholder="Nowy Dom Sp. z o.o.">

        <label>Opis usługi</label>
        <input type="text" id="serviceDesc" placeholder="Remont łazienki 15m²">

        <div class="row">
            <div>
                <label>Cena netto</label>
                <input type="number" id="priceNet" placeholder="8500">
            </div>
            <div>
                <label>Waluta</label>
                <select id="currency">
                    <option value="PLN">PLN</option>
                    <option value="EUR">EUR</option>
                    <option value="USD">USD</option>
                </select>
            </div>
        </div>

        <label>Termin</label>
        <input type="date" id="deadline">

        <label>Dodatkowe warunki</label>
        <input type="text" id="additional" placeholder="Gwarancja 24 miesiące, płatność 50/50">

        <div class="btn-group">
            <button class="btn btn-primary" onclick="generateOffer()">⚡ Generuj ofertę</button>
            <button class="btn btn-secondary" onclick="copyOffer()">📋 Kopiuj</button>
            <button class="btn btn-secondary" onclick="generatePDF()">📄 PDF</button>
            <button class="btn btn-secondary" onclick="toggleHistory()">📜 Historia</button>
        </div>

        <div class="output" id="outputArea">
            <span class="output-placeholder">Wygenerowana oferta pojawi się tutaj...</span>
        </div>

        <div id="historySection" class="hidden" style="margin-top:25px;">
            <h3 style="margin-bottom:12px; color:#1e293b;">📜 Moje oferty</h3>
            <div id="historyList"></div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
    // ==================== KONFIGURACJA ====================
    const SUPABASE_URL = 'https://TWOJE_PROJECT_ID.supabase.co';
    const SUPABASE_ANON_KEY = 'TWOJ_ANON_PUBLIC_KEY';
    const GROQ_API_KEY = 'gsk_TWOJ_GROQ_API_KEY';

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let currentUser = null;

    // ==================== LOGOWANIE ====================
    function showRegister() {
        document.getElementById('loginForm').classList.add('hidden');
        document.getElementById('registerForm').classList.remove('hidden');
    }

    function showLogin() {
        document.getElementById('registerForm').classList.add('hidden');
        document.getElementById('loginForm').classList.remove('hidden');
    }

    async function handleRegister() {
        const email = document.getElementById('registerEmail').value;
        const password = document.getElementById('registerPassword').value;
        if (!email || password.length < 6) {
            alert('Email i hasło (min. 6 znaków) są wymagane.');
            return;
        }
        const { data, error } = await supabase.auth.signUp({ email, password });
        if (error) { alert('Błąd: ' + error.message); return; }
        alert('Zarejestrowano! Możesz się zalogować.');
        showLogin();
    }

    async function handleLogin() {
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        if (!email || !password) { alert('Wpisz email i hasło.'); return; }
        const { data, error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) { alert('Błąd logowania: ' + error.message); return; }
        currentUser = data.user;
        afterLogin();
    }

    async function handleLogout() {
        await supabase.auth.signOut();
        currentUser = null;
        document.getElementById('authSection').classList.add('active');
        document.getElementById('appSection').classList.remove('active');
    }

    // ==================== PO ZALOGOWANIU ====================
    async function afterLogin() {
        document.getElementById('authSection').classList.remove('active');
        document.getElementById('appSection').classList.add('active');
        document.getElementById('userEmail').textContent = currentUser.email;

        const { data: profile } = await supabase
            .from('profiles')
            .select('*')
            .eq('id', currentUser.id)
            .single();

        if (!profile) {
            await supabase
                .from('profiles')
                .insert([{ id: currentUser.id, email: currentUser.email, offers_today: 0, last_offer_date: new Date().toISOString().slice(0,10) }]);
        }

        updateCounter();
        loadHistory();
    }

    // ==================== LICZNIK ====================
    async function updateCounter() {
        const { data, error } = await supabase
            .from('profiles')
            .select('offers_today, last_offer_date')
            .eq('id', currentUser.id)
            .single();

        if (error) { console.error(error); return; }

        const today = new Date().toISOString().slice(0,10);
        let count = data.offers_today;
        if (data.last_offer_date !== today) {
            count = 0;
            await supabase
                .from('profiles')
                .update({ offers_today: 0, last_offer_date: today })
                .eq('id', currentUser.id);
        }
        document.getElementById('counterDisplay').textContent = `Dzisiaj: ${count}/5`;
        return count;
    }

    async function incrementCounter() {
        const { data } = await supabase
            .from('profiles')
            .select('offers_today, last_offer_date')
            .eq('id', currentUser.id)
            .single();

        const today = new Date().toISOString().slice(0,10);
        let newCount = data.offers_today + 1;
        if (data.last_offer_date !== today) newCount = 1;

        await supabase
            .from('profiles')
            .update({ offers_today: newCount, last_offer_date: today })
            .eq('id', currentUser.id);

        document.getElementById('counterDisplay').textContent = `Dzisiaj: ${newCount}/5`;
        return newCount;
    }

    // ==================== GENEROWANIE OFERTY ====================
    async function generateOffer() {
        const client = document.getElementById('clientName').value || '[brak]';
        const description = document.getElementById('serviceDesc').value || '[brak]';
        const price = document.getElementById('priceNet').value || '[brak]';
        const currency = document.getElementById('currency').value || 'PLN';
        const deadline = document.getElementById('deadline').value || '[brak]';
        const additional = document.getElementById('additional').value || '[brak]';

        const count = await updateCounter();
        if (count >= 5) {
            const offlineOffer = `OFERTA nr ${Math.floor(Math.random()*900000+100000)}
Data: ${new Date().toISOString().slice(0,10)}

Szanowni Państwo,
Dziękujemy za zapytanie dotyczące ${description}.
Oferujemy:
${description}
za ${price} ${currency} netto.

Termin realizacji: ${deadline}

Warunki:
${additional}

Z poważaniem,
Firma Budowlana XYZ
tel. 123 456 789
biuro@budowlana.pl`;
            document.getElementById('outputArea').textContent = offlineOffer;
            document.getElementById('outputArea').classList.remove('output-placeholder');
            return;
        }

        const prompt = `Wygeneruj profesjonalną ofertę dla klienta:
Nazwa klienta: ${client}
Opis usługi: ${description}
Cena: ${price} ${currency}
Termin: ${deadline}
Dodatkowe warunki: ${additional}

Format:
OFERTA nr [losowy 6-cyfrowy]
Data: [dzisiejsza]

Szanowni Państwo,
Dziękujemy za zapytanie dotyczące ${description}.
Oferujemy:
${description}
za ${price} ${currency} netto.

Termin realizacji: ${deadline}

Warunki:
${additional}

Z poważaniem,
[Nazwa Twojej firmy]
tel. [telefon]
email@firma.pl`;

        try {
            const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${GROQ_API_KEY}`
                },
                body: JSON.stringify({
                    model: 'mixtral-8x7b-32768',
                    messages: [{ role: 'user', content: prompt }],
                    temperature: 0.7,
                    max_tokens: 600
                })
            });

            const data = await response.json();
            let generatedText = data.choices?.[0]?.message?.content || 'Błąd generowania oferty.';

            document.getElementById('outputArea').textContent = generatedText;
            document.getElementById('outputArea').classList.remove('output-placeholder');

            const hashBuffer = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(client + description + price + deadline + additional + currency));
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const hash = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');

            await supabase
                .from('offers')
                .insert([{
                    user_id: currentUser.id,
                    client_name: client,
                    service_desc: description,
                    price_net: parseFloat(price) || 0,
                    deadline: deadline,
                    additional: additional,
                    currency: currency,
                    generated_text: generatedText,
                    hash: hash
                }]);

            await incrementCounter();

        } catch (error) {
            alert('Błąd połączenia z AI: ' + error.message);
        }
    }

    // ==================== KOPIUJ ====================
    function copyOffer() {
        const text = document.getElementById('outputArea').textContent;
        if (!text || text.includes('Wygenerowana oferta')) {
            alert('Najpierw wygeneruj ofertę.');
            return;
        }
        navigator.clipboard.writeText(text).then(() => {
            alert('Skopiowano do schowka!');
        }).catch(() => {
            const area = document.createElement('textarea');
            area.value = text;
            document.body.appendChild(area);
            area.select();
            document.execCommand('copy');
            document.body.removeChild(area);
            alert('Skopiowano!');
        });
    }

    // ==================== PDF ====================
    function generatePDF() {
        const text = document.getElementById('outputArea').textContent;
        if (!text || text.includes('Wygenerowana oferta')) {
            alert('Najpierw wygeneruj ofertę.');
            return;
        }

        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('p', 'pt', 'a4');
        const margin = 40;
        const pageWidth = 595.28;
        const maxWidth = pageWidth - 2 * margin;

        doc.setFontSize(14);
        doc.setFont('helvetica', 'normal');

        const lines = text.split('\n');
        let y = margin;

        lines.forEach(line => {
            if (y > 720) {
                doc.addPage();
                y = margin;
            }
            if (line.trim().startsWith('OFERTA nr')) {
                doc.setFont('helvetica', 'bold');
                doc.text(line.trim(), margin, y);
                doc.setFont('helvetica', 'normal');
            } else {
                doc.text(line.trim() || ' ', margin, y);
            }
            y += 16;
        });

        doc.save('oferta.pdf');
    }

    // ==================== HISTORIA ====================
    let historyVisible = false;

    async function loadHistory() {
        const { data, error } = await supabase
            .from('offers')
            .select('*')
            .eq('user_id', currentUser.id)
            .order('created_at', { ascending: false });

        if (error) { console.error(error); return; }

        const list = document.getElementById('historyList');
        if (!data || data.length === 0) {
            list.innerHTML = '<p style="color:#94a3b8;">Brak zapisanych ofert.</p>';
            return;
        }

        list.innerHTML = data.map(o => `
            <div class="history-item">
                <strong>${o.client_name}</strong> – ${o.service_desc}
                <br><small>${o.created_at?.slice(0,10)} | ${o.price_net} ${o.currency}</small>
                <div class="offer-text">${o.generated_text}</div>
            </div>
        `).join('');
    }

    function toggleHistory() {
        const section = document.getElementById('historySection');
        if (historyVisible) {
            section.classList.add('hidden');
            historyVisible = false;
        } else {
            section.classList.remove('hidden');
            historyVisible = true;
            loadHistory();
        }
    }

    // ==================== AUTOLOGOWANIE ====================
    supabase.auth.getSession().then(({ data }) => {
        if (data.session) {
            currentUser = data.session.user;
            afterLogin();
        }
    });

    supabase.auth.onAuthStateChange((event, session) => {
        if (event === 'SIGNED_IN' && session) {
            currentUser = session.user;
            afterLogin();
        }
        if (event === 'SIGNED_OUT') {
            currentUser = null;
            document.getElementById('authSection').classList.add('active');
            document.getElementById('appSection').classList.remove('active');
        }
    });
</script>
</body>
</html>
